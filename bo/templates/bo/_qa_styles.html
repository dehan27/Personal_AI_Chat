{% comment %}Q&A 관련 공용 CSS. 각 페이지에서 extra_head 블록에 include{% endcomment %}
<style>
  .qa-subnav {
    display: flex;
    gap: var(--space-2);
    margin-bottom: var(--space-6);
    padding: 4px;
    background: var(--color-bg-tertiary);
    border-radius: var(--radius-md);
    width: fit-content;
  }
  .qa-subnav-item {
    padding: var(--space-2) var(--space-4);
    font-size: var(--font-size-sm);
    color: var(--color-text-secondary);
    border-radius: var(--radius-sm);
    cursor: pointer;
    text-decoration: none;
    transition: all var(--transition-base);
  }
  .qa-subnav-item:hover { color: var(--color-text-primary); }
  .qa-subnav-item.active {
    background: var(--color-bg);
    color: var(--color-text-primary);
    font-weight: var(--font-weight-medium);
    box-shadow: var(--shadow-sm);
  }
  .qa-subnav-count {
    display: inline-block;
    margin-left: 4px;
    padding: 1px 6px;
    background: var(--color-bg-tertiary);
    border-radius: var(--radius-full);
    font-size: 11px;
    color: var(--color-text-muted);
  }
  .qa-subnav-item.active .qa-subnav-count {
    background: var(--color-accent-light);
    color: var(--color-accent-text);
  }

  .qa-tabs {
    display: flex;
    gap: var(--space-1);
    margin-bottom: var(--space-6);
    border-bottom: 1px solid var(--color-border);
  }
  .qa-tab {
    padding: var(--space-3) var(--space-4);
    font-size: var(--font-size-sm);
    color: var(--color-text-secondary);
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    cursor: pointer;
    text-decoration: none;
    transition: all var(--transition-base);
  }
  .qa-tab:hover { color: var(--color-text-primary); }
  .qa-tab.active {
    color: var(--color-accent-text);
    border-bottom-color: var(--color-accent);
    font-weight: var(--font-weight-medium);
  }
  .qa-tab-count {
    display: inline-block;
    margin-left: 6px;
    padding: 1px 6px;
    background: var(--color-bg-tertiary);
    border-radius: var(--radius-full);
    font-size: 11px;
    color: var(--color-text-muted);
  }
  .qa-tab.active .qa-tab-count {
    background: var(--color-accent-light);
    color: var(--color-accent-text);
  }

  .qa-card {
    background: var(--color-bg);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-lg);
    padding: var(--space-5);
    margin-bottom: var(--space-4);
    box-shadow: var(--shadow-sm);
  }

  .qa-question {
    font-size: var(--font-size-md);
    font-weight: var(--font-weight-semibold);
    color: var(--color-text-primary);
    margin: 0 0 var(--space-3);
  }

  .qa-answer {
    font-size: var(--font-size-sm);
    color: var(--color-text-primary);
    line-height: var(--line-height-normal);
    background: var(--color-bg-secondary);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
    padding: var(--space-3) var(--space-4);
    white-space: pre-wrap;
    margin-bottom: var(--space-3);
  }

  .qa-answer-editor {
    width: 100%;
    min-height: 140px;
    font-family: inherit;
    font-size: var(--font-size-sm);
    color: var(--color-text-primary);
    background: var(--color-bg);
    border: 1px solid var(--color-accent-border);
    border-radius: var(--radius-md);
    padding: var(--space-3) var(--space-4);
    resize: vertical;
    outline: none;
    line-height: var(--line-height-normal);
  }
  .qa-answer-editor:focus {
    box-shadow: 0 0 0 3px var(--color-accent-light);
  }

  .qa-meta {
    display: flex;
    flex-wrap: wrap;
    gap: var(--space-3);
    font-size: var(--font-size-xs);
    color: var(--color-text-muted);
    margin-bottom: var(--space-3);
  }

  .qa-feedback-count {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .qa-actions, .qa-edit-actions {
    display: flex;
    gap: var(--space-2);
    justify-content: flex-end;
  }
  .qa-edit-actions { margin-top: var(--space-2); }

  /* ── 검색 폼 (탭 바로 아래) ───────────────────────────────────── */
  /* 내부 구성요소는 가이드라인 .input-icon-wrap / .input.input-with-icon-left
     / .btn.btn-primary / .btn.btn-secondary.refresh-btn 을 그대로 사용한다.
     폭은 아래 카드 리스트와 같이 가로 전체를 쓴다. */
  .qa-search {
    display: flex;
    gap: var(--space-2);
    margin-bottom: var(--space-4);
  }
  .qa-search .input-icon-wrap { flex: 1; min-width: 0; }
  .qa-search .refresh-btn {
    flex-shrink: 0;
    width: 38px;
    padding: 0;
  }

  /* ── 일괄 선택 모드 ─────────────────────────────────────────── */
  /* 툴바와 선택 스타일은 기본적으로 숨겨져 있다가 .bulk-mode 가 켜지면 드러난다. */
  .qa-bulk-toolbar {
    display: none;
    align-items: center;
    gap: var(--space-3);
    padding: var(--space-3) var(--space-4);
    margin-bottom: var(--space-4);
    background: var(--color-bg-secondary);
    border: 1px solid var(--color-border);
    border-radius: var(--radius-md);
  }
  .qa-bulk-toolbar .qa-bulk-count {
    margin-left: auto;
    font-size: var(--font-size-xs);
    color: var(--color-text-muted);
  }
  .qa-page.bulk-mode .qa-bulk-toolbar { display: flex; }

  /* 편집 모드에서 카드 자체가 클릭 타깃처럼 보이게 */
  .qa-page.bulk-mode .qa-card {
    cursor: pointer;
    transition: border-color var(--transition-base), box-shadow var(--transition-base), background var(--transition-base);
  }
  .qa-page.bulk-mode .qa-card:hover {
    border-color: var(--color-accent-border);
  }
  .qa-page.bulk-mode .qa-card.selected {
    border: 2px solid var(--color-accent);
    background: var(--color-accent-light);
    /* 2px 테두리 증가분을 패딩으로 보정해 내부 레이아웃 흔들림 방지 */
    padding: calc(var(--space-5) - 1px);
  }

  /* 편집 모드에서 단건 액션·편집 폼은 숨긴다. bulk 액션 사용을 유도. */
  .qa-page.bulk-mode .qa-actions,
  .qa-page.bulk-mode .qa-answer-editor-form {
    display: none !important;
  }

  /* 편집 모드 토글 버튼이 활성 상태일 때 식별되도록 */
  .qa-edit-toggle.active {
    background: var(--color-accent-light);
    border-color: var(--color-accent);
    color: var(--color-accent-text);
  }
</style>
