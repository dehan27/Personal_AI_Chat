{% load static %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}백오피스{% endblock %} · AI Chat BO</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'bo/bo.css' %}">
  {% block extra_head %}{% endblock %}
</head>
<body>
  <div class="app-layout">
    <aside class="sidebar">
      <div class="sidebar-logo">AI Chat BO</div>
      <nav class="sidebar-nav">
        {% with current=request.resolver_match.url_name %}
          <a href="{% url 'bo:dashboard' %}" class="sidebar-nav-item {% if current == 'dashboard' %}active{% endif %}">
            <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="9"></rect>
              <rect x="14" y="3" width="7" height="5"></rect>
              <rect x="14" y="12" width="7" height="9"></rect>
              <rect x="3" y="16" width="7" height="5"></rect>
            </svg>
            대시보드
          </a>
          <a href="{% url 'bo:files' %}" class="sidebar-nav-item {% if current == 'files' or current == 'review' %}active{% endif %}">
            <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
              <polyline points="14 2 14 8 20 8"></polyline>
            </svg>
            파일관리
          </a>
          <a href="{% url 'bo:qa_logs' %}" class="sidebar-nav-item {% if current == 'qa_logs' or current == 'qa_feedback' or current == 'qa_canonical' or current == 'qa_root' %}active{% endif %}">
            <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path>
            </svg>
            Q&amp;A 관리
          </a>
          <a href="{% url 'bo:prompts' %}" class="sidebar-nav-item {% if current == 'prompts' or current == 'prompts_edit' %}active{% endif %}">
            <svg class="sidebar-nav-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 20h9"></path>
              <path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"></path>
            </svg>
            Prompt 관리
          </a>
        {% endwith %}
      </nav>
    </aside>

    <main class="main-content">
      {% block content %}{% endblock %}
    </main>
  </div>

  {% block scripts %}{% endblock %}
</body>
</html>
