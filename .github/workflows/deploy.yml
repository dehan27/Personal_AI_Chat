# 태그 푸시(v*) 시 자동 배포 워크플로우.
#
# 흐름:
#   1. 릴리즈 태그(v0.3.0 등) push
#   2. build-and-push 잡: Docker 이미지 빌드 → GHCR에 태그와 latest 두 가지로 push
#   3. deploy 잡: 운영 호스트에 SSH 접속 → APP_IMAGE_TAG 갱신 → compose pull → up -d
#
# 필요한 GitHub Secrets:
#   SSH_PRIVATE_KEY  — 운영 호스트 접속용 OpenSSH 비공개키
#   DEPLOY_HOST      — 운영 호스트 주소
#   DEPLOY_USER      — 운영 호스트 사용자명
#   DEPLOY_PORT      — 운영 호스트 SSH 포트
#   DEPLOY_PATH      — 운영 호스트에서 compose 가 있는 절대 경로
#
# Settings → Actions → General → Workflow permissions = "Read and write" 필수
# (GHCR push 에 GITHUB_TOKEN 의 packages:write 권한 필요).

name: deploy

on:
  push:
    tags:
      - 'v*'          # v0.3.0, v1.0.0 등
  workflow_dispatch:  # 수동 실행 허용 (긴급 재배포용)

env:
  REGISTRY: ghcr.io
  # 소문자 필요. 레포 이름 그대로 사용.
  IMAGE_NAME: sean-59/personal_ai_chat

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.meta.outputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      # 빌드 캐시 최적화
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # 태그명에서 "v" 접두사 그대로 유지 (v0.3.0 → ghcr.io/.../personal_ai_chat:v0.3.0).
      # 수동 실행 시엔 git sha 사용.
      - id: meta
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="manual-${GITHUB_SHA::7}"
          fi
          echo "image_tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Built image tag: ${TAG}"

      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.prod
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.image_tag }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - name: SSH and roll the stack
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
          DEPLOY_PORT: ${{ secrets.DEPLOY_PORT }}
          DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
        run: |
          set -euo pipefail

          # SSH 키 준비
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null

          # 운영 호스트에서 태그 변경 후 pull/up.
          # DEPLOY_PATH 에 이미 docker-compose.yml + .env 가 놓여 있어야 함.
          #
          # 비대화식 SSH 쉘은 /etc/profile 을 로드하지 않아 docker 가 들어있는
          # /usr/local/bin 이 PATH 에 없을 수 있음. 먼저 PATH 를 보강.
          ssh -p "$DEPLOY_PORT" -i ~/.ssh/id_ed25519 "$DEPLOY_USER@$DEPLOY_HOST" \
            "export PATH=/usr/local/bin:/usr/local/sbin:\$PATH && \
             cd '$DEPLOY_PATH' && \
             if grep -q '^APP_IMAGE_TAG=' .env; then \
               sed -i 's|^APP_IMAGE_TAG=.*|APP_IMAGE_TAG=${IMAGE_TAG}|' .env; \
             else \
               echo 'APP_IMAGE_TAG=${IMAGE_TAG}' >> .env; \
             fi && \
             docker compose pull && \
             docker compose up -d && \
             docker image prune -f"
